name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (library)
        run: pnpm --filter @ai-lib/components exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @ai-lib/components test

      - name: Build library
        run: pnpm --filter @ai-lib/components build

      - name: Type check (demo)
        run: pnpm --filter demo exec tsc --noEmit